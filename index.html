<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodir & Zukhra - Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dusty-rose: #C9A9A6;
            --dusty-rose-dark: #A67E7A;
            --sage-green: #9CAF88;
            --sage-green-dark: #7A8F6A;
            --soft-cream: rgba(255, 253, 245, 0.5); /* Slightly clearer for visibility */
            --cream-solid: #FFFDF5;
            --charcoal: #3D3D3D;
            --charcoal-light: #5A5A5A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Lato', sans-serif;
            color: var(--charcoal);
            line-height: 1.6;
            overflow-x: hidden;
            background-color: var(--cream-solid); /* Fallback if video fails */
        }

        /* Video Background Fixes */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: black; /* Prevents white flash */
        }

        .video-background {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--soft-cream);
            z-index: -1;
            pointer-events: none;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .hero-content {
            max-width: 800px;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-subtitle {
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--charcoal-light);
            margin-bottom: 1.5rem;
        }

        .hero-names {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 500;
            color: var(--charcoal);
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .hero-names span {
            font-style: italic;
            color: var(--dusty-rose-dark);
        }

        .hero-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, var(--sage-green), var(--dusty-rose));
            margin: 2rem auto;
        }

        .hero-details {
            font-size: 1rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .hero-location {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-style: italic;
            color: var(--sage-green-dark);
        }

        /* Details Section */
        .details-section {
            background-color: var(--cream-solid);
            border-radius: 20px;
            padding: 4rem 2rem;
            margin: 3rem auto;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            margin-top: 2rem;
        }

        .detail-item { text-align: center; }

        .detail-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--sage-green), var(--sage-green-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-icon svg { width: 22px; height: 22px; stroke: white; fill: none; }

        .detail-value { font-family: 'Playfair Display', serif; font-size: 1.3rem; }

        /* Photo Circles */
        .photos-grid {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 3rem 0;
        }

        .photo-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* RSVP Button */
        .rsvp-content {
            background: linear-gradient(135deg, var(--dusty-rose) 0%, var(--sage-green) 100%);
            border-radius: 20px;
            padding: 4rem 2rem;
            color: white;
            max-width: 600px;
            margin: 3rem auto;
            text-align: center;
        }

        .btn-rsvp {
            display: inline-block;
            padding: 1rem 3rem;
            background: white;
            color: var(--charcoal);
            border-radius: 50px;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 0.2em;
            font-weight: 500;
            margin-top: 2rem;
            transition: 0.3s;
        }

        .btn-rsvp:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }

        footer { text-align: center; padding: 3rem 0; background: var(--cream-solid); }

        @media (max-width: 768px) {
            .hero-names { font-size: 3rem; }
            .photo-circle { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video class="video-background" autoplay muted loop playsinline poster="photo1.jpg">
            <source src="waves.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <section class="hero">
        <div class="hero-content">
            <p class="hero-subtitle">Together with their families</p>
            <h1 class="hero-names">Nodir <span>&</span> Zukhra</h1>
            <div class="hero-divider"></div>
            <p class="hero-details">July 3, 2026</p>
            <p class="hero-location">Antalya, Turkey</p>
        </div>
    </section>

    <section class="details-section">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 2rem;">The Celebration</h2>
        <div class="details-grid">
            <div class="detail-item">
                <div class="detail-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <p class="detail-value">July 3, 2026</p>
            </div>
            <div class="detail-item">
                <div class="detail-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <p class="detail-value">6:00 PM</p>
            </div>
            <div class="detail-item">
                <div class="detail-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <p class="detail-value">Antalya Yacht</p>
            </div>
        </div>
    </section>

    <section style="text-align: center;">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 1rem;">Our Moments</h2>
        <div class="photos-grid">
            <div class="photo-circle"><img src="photo1.jpg" alt="Photo 1"></div>
            <div class="photo-circle"><img src="photo2.jpg" alt="Photo 2"></div>
            <div class="photo-circle"><img src="photo3.jpg" alt="Photo 3"></div>
        </div>
    </section>

    <section class="rsvp-section">
        <div class="rsvp-content">
            <h2 style="font-family: 'Playfair Display', serif; font-size: 2.2rem;">Join Us</h2>
            <p style="margin-top: 1rem; font-style: italic;">Kindly reply by May 1</p>
            <a href="YOUR_GOOGLE_FORM_URL" target="_blank" class="btn-rsvp">RSVP Online</a>
        </div>
    </section>

    <footer>
        <p style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem;">Nodir & Zukhra</p>
    </footer>

</body>
</html>
